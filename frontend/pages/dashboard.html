<head>

<body>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 class="logo">BIBLIOTECA</h2>
                <div class="menu-toggle" id="menu-toggle">☰</div>
            </div>
            <nav>
                <a href="dashboard.html"><p>Dashboard</p></a>
                <a href="books.html"><p>Livros</p></a>
                <a href="grupos.html"><p>Grupos</p></a>
                <a href="perfil"><p>Perfil</p></a>
                <a href="admin.html"><p>Admin</p></a>
            </nav>
        </aside>

        <!-- Main -->
        <div class="main">
            <!-- Header -->
            <header class="header">
                <h1>Dashboard</h1>
                <div class="header-right">
                    <div class="theme-toggle" id="theme-toggle">🌙</div>
                    <div class="profile">

            <section class="cards">

                <div class="card">
                    <h3>Total de Livros</h3>
                    <span id="num-total-livros">0</span>
                </div>
                <!-- ID adicionado para disponíveis -->
                <div class="card">
                    <h3>Livros Disponíveis</h3>
                    <p id="dash-disponiveis">0</p>
                </div>
                <!-- ID adicionado para alugados -->
                <div class="card">
                    <h3>Livros Alugados</h3>
                    <p id="dash-alugados">0</p>
                </div>
                <div class="card">
                    <h3>Usuários</h3>
                    <p>18</p> <!-- Valor fixo por enquanto -->
                </div>
            </section>

            <!-- Últimos Livros -->
            <!-- No seu dashboard.html ou index.html -->

                <h2>Livros Recentes</h2>
                <div class="books" id="recent-books-container">
                    <!-- O JS vai injetar os cards aqui -->
                </div>
            </section>
        </div>
    </div>

    <script src="../js/dashboard.js"></script>
    <script type="module" src="../js/dashboard.js"></script>
    
    <script>
        // js/dashboard.js (ou dentro da tag script da dashboard)
    import { db } from '../js/firebase.js';

    // Carregar dados assim que a página abrir
    window.onload = async () => {
    carregarResumoLivros();

};
