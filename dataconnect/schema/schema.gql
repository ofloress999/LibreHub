type User @table {
  displayName: String!
  email: String
  profilePictureUrl: String
  createdAt: Timestamp!
}

type Resource @table {
  user: User
  title: String!
  resourceType: String!
  author: String
  url: String
  filePath: String
  totalPagesOrDuration: Int
  status: String
  description: String
  createdAt: Timestamp!
}

type Category @table {
  user: User
  name: String!
  description: String
  createdAt: Timestamp!
}

type ResourceCategory @table(key: ["resource", "category"]) {
  resource: Resource!
  category: Category!
  createdAt: Timestamp!
}

type Note @table {
  user: User
  resource: Resource
  content: String!
  pageNumberOrTimestamp: String
  isHighlight: Boolean
  createdAt: Timestamp!
}

type StudyPlan @table {
  user: User
  name: String!
  description: String
  startDate: Date!
  endDate: Date!
  status: String
  createdAt: Timestamp!
}

type StudyPlanResource @table(key: ["studyPlan", "resource"]) {
  studyPlan: StudyPlan!
  resource: Resource!
  addedAt: Timestamp!
  notesForPlan: String
}