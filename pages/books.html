<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Livros</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/livros.css">
</head>

<body>
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 class="logo">BIBLIOTECA</h2>
                <div class="menu-toggle" id="menu-toggle">☰</div>
            </div>
            <nav>
                <a href="dashboard.html"><p>Dashboard</p></a>
                <a href="books.html"><p>Livros</p></a>
                <a href="grupos.html"><p>Grupos</p></a>
                <a href="perfil.html"><p>Perfil</p></a>
                <a href="admin.html"><p>Admin</p></a>
            </nav>
        </aside>

        <div class="main">
            <header class="header">
                <h1>Gerenciamento de Livros</h1>
                <div class="header-right">
                    <div class="theme-toggle" id="theme-toggle">🌙</div>
                    <div class="profile">
                        <img src="../img/user.png" id="profileBtn" alt="Perfil">
                        <div class="dropdown" id="dropdown">
                            <a href="perfil.html">Perfil</a>
                            <a href="../index.html">Logout</a>
                        </div>
                    </div>
                </div>
            </header>

            <section class="books-page">
                <div class="books-top">
                    <h2 id="page-title">Biblioteca de Livros</h2>
                    <div id="area-admin-cadastro" style="display: none;">
                        <button class="btn-add" onclick="window.location.href='cadastrarLivro.html'">
                            + Cadastrar Novo Livro
                        </button>
                    </div>
                </div>

                <div class="books-filters">
                    <input type="text" id="inputBusca" placeholder="Pesquisar por título ou autor..." style="width: 300px;">
                    
                    <select id="filtroGenero">
                        <option value="Todos">Todos os Gêneros</option>
                    </select>

                    <select id="filtroStatus">
                        <option value="Todos">Todos os Status</option>
                        <option value="Disponível">Disponível</option>
                        <option value="Esgotado">Esgotado</option>
                    </select>
                </div>

                <div id="container-cards-livros" class="books-grid"></div>

                <div id="area-admin-tabela" style="display: none;" class="table-container">
                    <table style="width: 100%; min-width: 800px;">
                        <thead>
                            <tr>
                                <th>Capa</th>
                                <th>Título</th>
                                <th>Autor</th>
                                <th>Status (Qtd)</th>
                                <th>Ações</th> 
                            </tr>
                        </thead>
                        <tbody id="tabelaLivrosCorpo"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <div id="modalEmprestimo" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="width: 500px;">
            <h2>Registrar Empréstimo</h2>
            <p id="nomeLivroModal" style="font-weight: bold; color: #2563eb; margin-bottom: 15px;"></p>
            
            <form id="formEmprestimo">
                <input type="hidden" id="idLivroModal">
                <input type="hidden" id="idUsuarioAluguel"> <div class="form-group">
                    <label>Pesquisar Usuário (CPF):</label>
                    <input type="text" id="inputUsuarioBusca" placeholder="000.000.000-00" required>
                </div>
                
                <div id="detalhesUsuario" style="background: #f8fafc; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 10px; display: none;">
                    <p><strong>Nome:</strong> <span id="info-nome"></span></p>
                    <p><strong>E-mail:</strong> <span id="info-email"></span></p>

                    <div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #cbd5e1;">
                        <label style="font-weight: bold; display: block; margin-bottom: 5px;">Selecione o Carimbo (ID físico):</label>
                        <select id="selectIdExemplar" class="form-control" required style="width: 100%; padding: 8px;">
                            <option value="">Carregando exemplares...</option>
                        </select>
                        <small style="color: #64748b;">Escolha o código carimbado no livro físico.</small>
                    </div>
                </div>

                <div class="modal-buttons" style="margin-top: 20px;">
                    <button type="button" class="btn delete" onclick="window.fecharModalEmprestimo()">Cancelar</button>
                    <button type="submit" class="btn-save" id="btnConfirmarEmprestimo" disabled>Confirmar Aluguel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modalDetalhesLivro" class="modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center;">
        <div class="modal-content" style="width: 750px; background: white; border-radius: 15px; padding: 30px; display: flex; gap: 30px; position: relative;">
            
            <div style="flex: 0 0 200px;">
                <img id="detalheCapa" src="" style="width: 100%; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); object-fit: cover;" alt="Capa">
            </div>

            <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
                <h2 id="detalheTitulo" style="margin: 0; color: #1e293b; font-size: 1.8rem;"></h2>
                <p id="detalheAutor" style="color: #64748b; margin: 0; font-weight: bold;"></p>
                
                <div id="detalheStatus"></div>

                <div id="detalheGeneros" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px;"></div>

                <div style="margin-top: 15px; flex-grow: 1;">
                    <h4 style="margin: 0 0 5px 0; color: #475569; font-size: 0.9rem; text-transform: uppercase;">Sinopse</h4>
                    <p id="detalheSinopse" style="color: #334155; line-height: 1.6; text-align: justify; margin: 0; max-height: 150px; overflow-y: auto;"></p>
                </div>

                <div class="modal-buttons" style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn delete" onclick="window.fecharModalGeral()" style="flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;">
                        Fechar
                    </button>
                    <a id="btnBaixarPDF" href="#" target="_blank" class="btn-save" style="flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        📥 Baixar PDF
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div id="modalListaAlugueis" class="modal-overlay" style="display: none; background: rgba(0,0,0,0.7);">
        <div class="modal-content" style="width: 550px; background: #f8fafc; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0; color: #1e293b; font-size: 1.5rem;">Exemplares Alugados</h2>
                <button onclick="document.getElementById('modalListaAlugueis').style.display='none'" style="background: none; border: none; font-size: 28px; cursor: pointer; color: #64748b;">&times;</button>
            </div>

            <div style="margin-bottom: 20px;">
                <input type="text" id="inputBuscaAluguelModal" placeholder="Buscar por aluno, CPF ou carimbo..." 
                    style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; outline: none;">
            </div>

            <div id="listaAlugueisCorpo" style="max-height: 450px; overflow-y: auto; padding-right: 5px;">
                </div>

            <div class="modal-buttons" style="margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 15px;">
                <button class="btn-save" style="width: 100%; background: #64748b;" onclick="document.getElementById('modalListaAlugueis').style.display='none'">Fechar Lista</button>
            </div>
        </div>
    </div>



    <script type="module" src="../js/livros.js"></script>
</body>
</html>
