<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 class="logo">BIBLIOTECA</h2>
                <div class="menu-toggle" id="menu-toggle">☰</div>
            </div>
            <nav>
                <a href="dashboard.html"><p>Dashboard</p></a>
                <a href="books.html"><p>Livros</p></a>
                <a href="grupos.html"><p>Grupos</p></a>
                <a href="perfil.html"><p>Perfil</p></a>
                <a href="admin.html"><p>Admin</p></a>
            </nav>
        </aside>

        <!-- Main -->
        <div class="main">
            <!-- Header -->
            <header class="header desktop-style">
                <h1>Dashboard</h1>
                <div class="header-right">
                    <div class="theme-toggle" id="theme-toggle">🌙</div>
                    <div class="profile">
                        <img src="../img/user.png" id="profileBtn">
                        <div class="dropdown" id="dropdown">
                            <a href="perfil.html">Perfil</a>
                            <a href="../index.html">Logout</a>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Cards -->
            <section class="cards">
                <div class="card">
                    <h3>Livros Alugados</h3>
                    <p id="dash-meus-alugados">0</p> 
                </div>
                <div class="card">
                    <h3>Minhas Reuniões</h3>
                    <p id="dash-minhas-reunioes">0</p>
                </div>
                <div class="card">
                    <h3>Livros Lidos</h3>
                    <p id="dash-livros-lidos">0</p>
                </div>
            </section>

            <section class="recent">
                <div class="section-header" style="display: flex; justify-content: space-between; width: 100%; align-items: center; padding: 0 10px;">
                    <h2>Novidades na Biblioteca</h2>
                    <a href="books.html" style="color: var(--primary); text-decoration: none; font-weight: bold;">Ver todos →</a>
                </div>
                <div class="books" id="recent-books-container">
                    </div>
            </section>
        </div>
    </div>

    <script type="module" src="../js/dashboard.js"></script>
    
</body>
</html>
